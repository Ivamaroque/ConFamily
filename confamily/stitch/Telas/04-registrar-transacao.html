<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface": "#001f2a",
              "outline": "#727781",
              "surface-bright": "#f4faff",
              "secondary-fixed-dim": "#59de9b",
              "on-primary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed-dim": "#80d8a6",
              "tertiary-container": "#005534",
              "surface-container-low": "#e6f6ff",
              "surface-container-highest": "#c9e7f7",
              "inverse-primary": "#a3c9ff",
              "error": "#ba1a1a",
              "secondary": "#006d43",
              "tertiary-fixed": "#9cf5c1",
              "on-primary-fixed-variant": "#004882",
              "on-tertiary-container": "#73cb99",
              "surface-container-high": "#ceedfd",
              "on-background": "#001f2a",
              "secondary-fixed": "#78fbb6",
              "on-secondary": "#ffffff",
              "on-primary-container": "#8abcff",
              "inverse-surface": "#163440",
              "on-tertiary-fixed-variant": "#005232",
              "on-secondary-container": "#007147",
              "on-tertiary-fixed": "#002111",
              "primary-fixed": "#d3e4ff",
              "error-container": "#ffdad6",
              "on-tertiary": "#ffffff",
              "on-error": "#ffffff",
              "outline-variant": "#c2c6d1",
              "primary-fixed-dim": "#a3c9ff",
              "secondary-container": "#75f8b3",
              "on-surface-variant": "#424750",
              "on-primary-fixed": "#001c38",
              "surface-tint": "#27609d",
              "primary-container": "#004b87",
              "surface": "#f4faff",
              "surface-dim": "#c0dfee",
              "surface-container": "#d9f2ff",
              "primary": "#003461",
              "inverse-on-surface": "#e0f4ff",
              "surface-variant": "#c9e7f7",
              "on-error-container": "#93000a",
              "tertiary": "#003c23",
              "background": "#f4faff",
              "on-secondary-fixed-variant": "#005232",
              "on-secondary-fixed": "#002111"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #f4faff; color: #001f2a; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .btn-gradient { background: linear-gradient(135deg, #003461 0%, #004b87 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); }
        input:focus { outline: none; border: none; box-shadow: 0 0 0 2px #003461; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 glass-panel border-b border-outline-variant/15 px-6 py-4 flex items-center gap-4">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container">
<span class="material-symbols-outlined text-primary">account_balance_wallet</span>
</div>
<h1 class="font-headline text-xl font-bold text-on-surface">Financeiro</h1>
</header>
<main class="max-w-md mx-auto px-6 py-8">
<div class="mb-8">
<h2 class="font-headline text-3xl font-extrabold text-on-surface mb-2">Registrar Transação</h2>
<p class="text-on-surface-variant font-body">Insira os detalhes da sua nova movimentação.</p>
</div>
<!-- Form Canvas -->
<form class="space-y-6">
<!-- Amount Section: Hero Data Point -->
<div class="bg-surface-container-lowest p-6 rounded-xl border border-outline-variant/10 shadow-sm">
<label class="block font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2">Valor da Transação</label>
<div class="flex items-baseline gap-2">
<span class="font-headline text-2xl font-bold text-primary">R$</span>
<input class="w-full font-headline text-4xl font-extrabold bg-transparent border-none p-0 focus:ring-0 text-on-surface placeholder:text-surface-dim" placeholder="0,00" step="0.01" type="number"/>
</div>
</div>
<div class="space-y-4">
<!-- Category Field -->
<div>
<label class="block font-label text-sm font-medium text-on-surface-variant mb-2">Categoria</label>
<div class="relative">
<select class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 appearance-none text-on-surface font-body">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Saúde</option>
<option>Educação</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-3 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Date & Description Grid -->
<div class="grid grid-cols-1 gap-4">
<div>
<label class="block font-label text-sm font-medium text-on-surface-variant mb-2">Data</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-on-surface font-body" type="date"/>
</div>
</div>
<div>
<label class="block font-label text-sm font-medium text-on-surface-variant mb-2">Descrição</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-on-surface font-body placeholder:text-outline/50" placeholder="Ex: Almoço executivo" type="text"/>
</div>
</div>
</div>
<!-- Installments Toggle Section (Asymmetric/Layered) -->
<div class="bg-surface-container p-5 rounded-xl space-y-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container">calendar_month</span>
</div>
<span class="font-headline font-bold text-on-surface">Parcelar?</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-dim peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary"></div>
</label>
</div>
<div class="grid grid-cols-2 gap-4 pt-2">
<div class="bg-surface-container-lowest p-3 rounded-lg">
<label class="block font-label text-[10px] font-bold text-on-surface-variant uppercase mb-1">Parcela Atual</label>
<input class="w-full bg-transparent border-none p-0 text-lg font-headline font-bold text-on-surface" type="number" value="1"/>
</div>
<div class="bg-surface-container-lowest p-3 rounded-lg">
<label class="block font-label text-[10px] font-bold text-on-surface-variant uppercase mb-1">Total Parcelas</label>
<input class="w-full bg-transparent border-none p-0 text-lg font-headline font-bold text-on-surface" type="number" value="12"/>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full btn-gradient h-14 rounded-xl text-on-primary font-headline font-bold text-lg flex items-center justify-center gap-2 shadow-lg" type="submit">
<span class="material-symbols-outlined">check</span>
                Confirmar Transação
            </button>
</form>
</main>
<!-- FAB -->
<div class="fixed right-6 bottom-24">
<button class="w-14 h-14 btn-gradient rounded-xl shadow-xl flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 glass-panel border-t border-outline-variant/15 px-6 py-3 flex justify-between items-center z-50">
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">dashboard</span>
<span class="font-label text-xs font-medium text-on-surface-variant group-hover:text-primary">Painel</span>
</button>
<button class="flex flex-col items-center gap-1 group relative">
<div class="absolute -top-1 w-8 h-1 bg-secondary rounded-full"></div>
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="font-label text-xs font-bold text-on-surface">Gastos</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">settings</span>
<span class="font-label text-xs font-medium text-on-surface-variant group-hover:text-primary">Ajustes</span>
</button>
</nav>
</body></html>
